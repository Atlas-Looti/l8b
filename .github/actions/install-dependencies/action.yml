name: "Install dependencies"
description: "Prepare repository and install all dependencies with bun"

runs:
  using: "composite"
  steps:
    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: ".nvmrc"

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
