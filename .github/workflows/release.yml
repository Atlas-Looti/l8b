name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".editorconfig"
      - ".gitignore"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Check Types
        run: bun run check-types

      - name: Build
        run: bun run build

      - name: Test (Unit)
        run: bun run test

      - name: Bump versions
        run: bun run changeset-version
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}

      - name: Commit version bumps
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[ci] release"
          file_pattern: |
            packages/*/package.json
            .changeset/*.md
            **/CHANGELOG.md

      - name: Create .npmrc for publishing
        run: |
          printf "//registry.npmjs.org/:_authToken=%s\n" "$NPM_TOKEN" > .npmrc
          printf "access=public\n" >> .npmrc
          printf "registry=https://registry.npmjs.org/\n" >> .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: bun run changeset-publish

      - name: Push commits and tags
        run: |
          git push
          git push --tags
