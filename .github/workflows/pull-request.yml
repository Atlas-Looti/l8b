name: Pull Request
on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format Check
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  verify:
    name: Verify
    uses: ./.github/workflows/verify.yml
    secrets: inherit