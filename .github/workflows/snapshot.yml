name: Snapshot
on:
  workflow_dispatch:

jobs:
  snapshot:
    name: Release Snapshot Version
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Determine snapshot tag
        id: snapshot-tag
        run: |
          BRANCH=$(git branch --show-current)
          SNAPSHOT_TAG=$(echo "$BRANCH" | tr -cs '[:alnum:]-' '-' | tr '[:upper:]' '[:lower:]' | sed 's/^-//;s/-$//')
          echo "tag=$SNAPSHOT_TAG" >> $GITHUB_OUTPUT
          echo "📦 Snapshot tag: $SNAPSHOT_TAG"

      - name: Configure npm authentication
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "❌ Error: NPM_TOKEN not set"
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/.npmrc
          npm config set "//registry.npmjs.org/:_authToken" "$NPM_TOKEN"

      - name: Version snapshot packages
        run: |
          echo "📝 Versioning packages with snapshot tag: ${{ steps.snapshot-tag.outputs.tag }}"
          bunx changeset version --no-git-tag --snapshot ${{ steps.snapshot-tag.outputs.tag }}

      - name: Reinstall dependencies after versioning
        run: |
          echo "📦 Reinstalling dependencies with updated versions..."
          bun install

      - name: Prepare for publishing
        run: bun run changeset:prepublish

      - name: Publish snapshot
        continue-on-error: true
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          bunx changeset publish --no-git-tag --snapshot ${{ steps.snapshot-tag.outputs.tag }} --tag ${{ steps.snapshot-tag.outputs.tag }} || {
            echo "⚠️ Some packages failed to publish (expected if versions exist)"
            exit 0
          }
          echo "✅ Snapshot published successfully with tag: ${{ steps.snapshot-tag.outputs.tag }}"
